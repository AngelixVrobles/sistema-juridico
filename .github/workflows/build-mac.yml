name: Build on Mac

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Build Electron app for Mac
        run: npm run electron:build:mac
