# electron-builder.yml — Configuración de empaquetado para Windows
# Uso: npm run electron:build:win

appId:   "mx.com.sistemajuridico.app"
productName: "Sistema Jurídico"
copyright: "© 2025 Sistema Jurídico"

# CLAVE: Copia node_modules del servidor next.js al paquete después del pack.
# electron-builder los filtra de extraResources, pero afterPack se ejecuta
# antes de crear el instalador NSIS/DMG, por lo que sí se incluyen.
afterPack: "./scripts/copy-standalone-modules.js"

# ─── Directorios ─────────────────────────────────────────────────────────────
directories:
  output: dist-electron
  buildResources: electron/resources

# ─── Archivos a incluir en el paquete ────────────────────────────────────────
files:
  - electron/main.js
  - electron/preload.js
  - "!node_modules/**"
  - "!src/**"
  - "!prisma/**"
  - "!scripts/**"
  - "!dist-electron/**"
  - "!.next/**"
  - "!*.ts"
  - "!*.md"

# ─── Recursos extra (copiados a resources/) ───────────────────────────────────
extraResources:
  # La app standalone se convierte en el "app"
  # Se excluye .next/node_modules/ porque es caché interna de Turbopack
  # (contiene directorios con hashes que rompen el empaquetado en macOS)
  - from: ".next/standalone"
    to: "app"
    filter:
      - "**/*"
      - "!.next/node_modules/**"
      - "!dist-electron/**"
  # DB semilla para primera ejecución
  - from: "prisma/biblioteca.db"
    to: "app/prisma/biblioteca.db"
  # Archivos estáticos y públicos
  - from: ".next/standalone/.next/static"
    to: "app/.next/static"
  - from: ".next/standalone/public"
    to: "app/public"

# ─── Icono de la aplicación ───────────────────────────────────────────────────
# Para personalizar el ícono, reemplaza los archivos en electron/resources/:
#   Windows → icon.ico  (mínimo 256×256 px, formato ICO multi-resolución)
#   macOS   → icon.icns (generado con `iconutil` a partir de un .iconset de Mac)
#
# El ícono aparecerá en: ventana de la app, barra de tareas,
# acceso directo del escritorio e instalador.

# ─── Windows ─────────────────────────────────────────────────────────────────
win:
  icon: electron/resources/icon.ico
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

# ─── macOS ────────────────────────────────────────────────────────────────────
mac:
  icon: electron/resources/icon.icns
  #
  # SOLUCIÓN EXC_BREAKPOINT (SIGTRAP) en macOS 13–26 sin certificado Apple:
  #
  # 1. hardenedRuntime: true  — mantiene HR activo (necesario en macOS 26).
  # 2. entitlements — declara explícitamente los permisos de JIT, dylibs sin
  #    firma, y variables de entorno que el motor V8 y Prisma necesitan.
  #    Sin estos permisos macOS lanza SIGTRAP al intentar compilar JS con JIT.
  # 3. gatekeeperAssess: false — impide que electron-builder ejecute spctl
  #    (que siempre falla sin Developer ID).
  # 4. La firma resultante es ad-hoc (sin Developer ID). El usuario deberá
  #    abrir la app la primera vez con clic derecho → Abrir, o ejecutar:
  #      sudo xattr -cr /Applications/Sistema\ Jurídico.app
  #
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements:        "electron/resources/entitlements.mac.plist"
  entitlementsInherit: "electron/resources/entitlements.mac.plist"
  target:
    - target: dmg
      arch: [x64, arm64]

# ─── Instalador NSIS ─────────────────────────────────────────────────────────
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Sistema Jurídico"
  uninstallDisplayName: "Sistema Jurídico — Desinstalar"

# ─── Portable ────────────────────────────────────────────────────────────────
portable:
  artifactName: "SistemaJuridico-portable-${version}.exe"

# ─── Autoactualización (opcional, requiere servidor de actualizaciones) ────────
